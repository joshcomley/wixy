name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install
        run: pip install -e ".[server,dev]"
      - name: Install Playwright chromium (parity harness)
        run: playwright install --with-deps chromium
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: mypy --strict
        run: mypy
      - name: pytest (fixed -n 4, never auto)
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: admin-ui install
        working-directory: admin-ui
        run: npm ci
      - name: admin-ui typecheck
        working-directory: admin-ui
        run: npm run typecheck
      - name: admin-ui test
        working-directory: admin-ui
        run: npm test
      - name: admin-ui build
        working-directory: admin-ui
        run: npm run build
      - name: editor install
        working-directory: editor
        run: npm ci
      - name: editor typecheck
        working-directory: editor
        run: npm run typecheck
      - name: editor test
        working-directory: editor
        run: npm test
      - name: editor build
        working-directory: editor
        run: npm run build
      - name: bundle drift check (committed bundles must match a fresh build)
        run: git diff --exit-code -- wixy_server/static

  e2e:
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install wixy (server) — fixture_server.py imports it directly
        run: pip install -e ".[server,dev]"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        working-directory: e2e
        run: npm ci
      - name: install playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: playwright test
        working-directory: e2e
        run: npx playwright test
