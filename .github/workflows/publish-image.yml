name: Publish image

# spec/independence/03 §1: builds+pushes on every main merge, ghcr.io/<owner>/wixy
# :latest + :<sha>. Package visibility must be PUBLIC (decisions/00051 #7 — the
# engine is MIT anyway, and this keeps registry auth off both the droplet and
# Watchtower) — GHCR creates a brand-new package PRIVATE by default regardless of
# this repo's own visibility, and flipping it public is a one-time GitHub package-
# settings action no workflow token can perform on its own (same class of human
# step as the MIT visibility flip itself, spec/independence/02 §3). Do this ONCE,
# right after this workflow's first successful run, at:
#   https://github.com/users/<owner>/packages/container/wixy/settings
# (or the org equivalent) -> Change visibility -> Public. Guide (milestone 8)
# carries this as a Track J step.
#
# vars.UPSTREAM_REPO / this workflow inherited into her fork (spec/independence/
# 04 §1's pattern) needs no guard here — publishing an image is meaningful on
# every fork too, unlike the sync workflow which must no-op in upstream.

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/standalone/Dockerfile
          push: true
          build-args: |
            WIXY_ENGINE_SHA=${{ github.sha }}
          # WIXY_SYNC_BASE is left unbaked here — upstream (joshcomley/wixy) is
          # not itself a fork and has no sync base. Milestone 4's sync workflow
          # is what gives a FORK's own copy of this workflow a real value to
          # pass (the upstream commit her fork last merged from).
          tags: |
            ghcr.io/${{ github.repository_owner }}/wixy:latest
            ghcr.io/${{ github.repository_owner }}/wixy:${{ github.sha }}
