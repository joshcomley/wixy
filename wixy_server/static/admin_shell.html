<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- An app shell, not content: pinch-zooming the OUTER page would pan the
     visual viewport away from the pinned edit chrome (slim bar, and with it
     the iframe's fixed composer) with no obvious way back — the operator's
     "rock solid, immovable" requirement (decisions/00083). Legibility is
     served by the in-app zoom + font-scale controls instead. The
     interactive-widget half makes the on-screen keyboard resize the LAYOUT
     viewport, so the whole shell (slim bar + iframe wrap) rides above it. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content">
<title>Wixy Admin</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/admin/static/favicon.ico" sizes="32x32">
<link rel="icon" href="/admin/static/icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="/admin/static/apple-touch-icon.png">
<script>
  // Synchronous theme bootstrap — runs before admin.css/admin.js load, so the
  // pre-JS loading screen (and the real shell right after it) never flashes
  // the wrong theme. admin-ui/src/theme.ts owns everything from here on
  // (live OS-preference tracking while "system" is selected, persistence);
  // this inline copy exists only because it must run before first paint,
  // which rules out waiting for the bundled JS. Keep the storage key and
  // "system" fallback behavior identical to theme.ts's own loadThemeMode.
  (function () {
    var mode = "system";
    try {
      var stored = localStorage.getItem("wx-theme-mode");
      if (stored === "light" || stored === "dark" || stored === "system") mode = stored;
    } catch (e) {}
    var variant = mode === "system"
      ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
      : mode;
    document.documentElement.setAttribute("data-theme", variant);

    // themeEditor.ts's custom-theme overrides (Uxer's theme-editor mandate,
    // item 9) — reuses the `variant` just resolved above rather than
    // recomputing it. Only this variant's half is needed pre-paint; the
    // other half (if any) is applied later by themeEditor.ts itself, same
    // as how a live mode switch re-applies. Validated the same shape
    // themeEditor.ts's own sanitizeColors requires (a plain #rrggbb hex per
    // key) before touching the CSSOM.
    try {
      var customRaw = localStorage.getItem("wx-custom-theme");
      if (customRaw) {
        var custom = JSON.parse(customRaw);
        var colors = custom && custom[variant];
        if (colors && typeof colors === "object") {
          for (var key in colors) {
            if (/^[a-zA-Z0-9-]+$/.test(key) && /^#[0-9a-fA-F]{6}$/.test(colors[key])) {
              document.documentElement.style.setProperty("--" + key, colors[key]);
            }
          }
        }
      }
    } catch (e) {}
  })();
  // Same synchronous-bootstrap reasoning as the theme block above, for the
  // other two Uxer session-persisted view controls (admin-ui/src/zoom.ts,
  // fontScale.ts own everything from here on). Keep the storage keys and
  // min/max/default bounds identical to those modules' own constants.
  (function () {
    try {
      var zoom = parseInt(localStorage.getItem("wx-zoom-level"), 10);
      if (!isFinite(zoom) || zoom < 50 || zoom > 200) zoom = 100;
      document.documentElement.style.zoom = String(zoom / 100);
    } catch (e) {}
    try {
      var fontScale = parseInt(localStorage.getItem("wx-font-scale"), 10);
      if (!isFinite(fontScale) || fontScale < 80 || fontScale > 150) fontScale = 100;
      document.documentElement.style.fontSize = fontScale + "%";
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="/admin/static/admin/admin.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--wx-canvas, #eaedf3);
    color: var(--wx-ink, #1e2430);
  }
  /* Pre-JS instant-render loading screen only (fleet instant-render rule: this
     paints before any fetch/JS runs). Scoped to a child wrapper, not #wx-shell
     itself, so it doesn't fight the real shell's own layout (admin-ui/src/
     style.css's .wx-shell) once main() replaces this wrapper's contents. */
  #wx-shell { min-height: 100vh; }
  .wx-loading-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .wx-loading { opacity: .6; }
</style>
</head>
<body>
<div id="wx-shell"><div class="wx-loading-wrap"><p class="wx-loading">Loading Wixy Admin&hellip;</p></div></div>
<script src="/admin/static/admin/admin.js"></script>
<script type="module">
  // Uxer MCP compliance-bridge (slice 7, decisions/00050). admin_shell.html is a
  // static, module-level-cached HTML string (wixy_server/app.py's get_admin_shell
  // reads it once at startup, no per-request Jinja2 templating) — so
  // UXER-INTEGRATION.md's own `{% if request.query_params.get('uxer') %}` gate
  // isn't available here. This reimplements the same guard client-side against
  // location.search, and uses a dynamic import() so the ~530kb compliance bundle
  // is never even fetched unless the param is present — normal visitors (every
  // real editor session) see zero Uxer footprint.
  const uxerParam = new URLSearchParams(location.search).get("uxer");
  if (uxerParam !== null) {
    const { runAndShow, bridgeConnect, registerAdapter, ServerRenderedAdapter, mountBridgeOverlay } =
      await import("/admin/static/uxer/uxer-compliance.js");

    // The real hash-routed panels (admin-ui/src/router.ts's Route union) — the
    // whole admin is one served document (see get_admin_shell's own docstring),
    // so these are hash fragments, not separate server-rendered pages.
    const adapter = new ServerRenderedAdapter({
      modules: [
        { id: "pages", name: "Pages", url: "/admin#/pages" },
        { id: "theme", name: "Theme", url: "/admin#/theme" },
        { id: "media", name: "Media", url: "/admin#/media" },
        { id: "chat", name: "Chat", url: "/admin#/chat" },
        { id: "history", name: "History", url: "/admin#/history" },
        { id: "settings", name: "Settings", url: "/admin#/settings" },
      ],
    });
    window.__uxerAdapter = adapter;
    registerAdapter(adapter);

    // Not a plain `window.addEventListener("load", ...)` (the doc's own literal
    // example): the `await import()` above already yields to the event loop
    // while fetching the ~530kb bundle, so `load` has very often already fired
    // by the time we get here — a bare listener would then just never run.
    // `readyState === "complete"` is `load`'s own after-the-fact signal, so
    // this covers both orderings.
    const runInit = async () => {
      await runAndShow("/uxer-style.json");
      bridgeConnect(uxerParam !== "1" ? parseInt(uxerParam, 10) : undefined);
      mountBridgeOverlay();
    };
    if (document.readyState === "complete") {
      runInit();
    } else {
      window.addEventListener("load", runInit, { once: true });
    }
  }
</script>
</body>
</html>
