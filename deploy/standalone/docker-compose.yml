# spec/independence/03 §2 (server + ingress + the deploy mechanism itself,
# decisions/00051 #3: Watchtower's image-pull polling IS the deploy — no
# inbound surface, no CI credentials ever reach the droplet) plus `worker`
# (the AI backend, milestone 6, spec/independence/05 §2). `backup` (the
# nightly state mirror, milestone 6/06) is added by its own later PR.
services:
  wixy:
    image: ${WIXY_IMAGE:-ghcr.io/joshcomley/wixy:latest}
    restart: unless-stopped
    volumes:
      - wixy-storage:/data
      # Deploy keys (setup.sh generates them under here, root 0600, spec/
      # independence/01 §3) — read-only into the container; GIT_SSH_COMMAND
      # below points git at the site-repo one. Never in .env: a multi-line PEM
      # doesn't fit the KEY=VALUE format the settings loader/.env files share.
      - ${WIXY_KEYS_DIR:-/opt/wixy/keys}:/keys:ro
    # No `env_file:` here on purpose — a relative `.env` path resolves against
    # THIS file's own directory (the cloned engine checkout), never against
    # /opt/wixy/.env where setup.sh actually writes it. Every value the
    # container needs is instead substituted below from the SAME file, via
    # every script's own `docker compose --env-file /opt/wixy/.env ...` — one
    # substitution mechanism, no risk of the two silently diverging.
    environment:
      # Read straight from /opt/wixy/.env (setup.sh writes all of these):
      WIXY_EDITION: ${WIXY_EDITION:-standalone}
      WIXY_ENV: ${WIXY_ENV:-prod}
      WIXY_PORT: ${WIXY_PORT:-9380}
      WIXY_DOMAIN: ${WIXY_DOMAIN}
      WIXY_INDEXABLE: ${WIXY_INDEXABLE:-1}
      WIXY_SITE_REPO: ${WIXY_SITE_REPO}
      WIXY_CF_TEAM_DOMAIN: ${WIXY_CF_TEAM_DOMAIN}
      WIXY_CF_ACCESS_AUD: ${WIXY_CF_ACCESS_AUD}
      # spec/independence/05 §1: "chosen by WIXY_AI_BACKEND" — the standalone
      # edition's whole point is running on her own key, via the `worker`
      # service below (http://worker:8100, AnthropicAIBackend's own default).
      WIXY_AI_BACKEND: ${WIXY_AI_BACKEND:-anthropic}
      # WIXY_STORAGE_ROOT=/data is the real setting name (wixy_server/
      # settings.py) — fixed by this compose file, not operator-configured.
      # WIXY_CONTAINERIZED=1 gates the 0.0.0.0 bind (__main__.py refuses it
      # outside a container).
      WIXY_STORAGE_ROOT: /data
      WIXY_CONTAINERIZED: "1"
      # IdentitiesOnly so ssh never falls back to trying every other key/agent
      # identity first; the engine image already pins github.com's host key
      # into /etc/ssh/ssh_known_hosts (Dockerfile), so StrictHostKeyChecking
      # can stay at its secure default instead of being disabled here.
      GIT_SSH_COMMAND: "ssh -i /keys/site-repo -o IdentitiesOnly=yes"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # No published ports (spec's own words) — cloudflared is the only path in;
    # reachable from other services on this compose network as http://wixy:<port>.

  # The AI backend (milestone 6, spec/independence/05 §2) — same image as
  # `wixy`, different `command:`. "Isolated from the serving container;
  # shares nothing but an internal queue volume/API" (spec's own words): its
  # own dedicated scratch volume (never `wixy-storage`), no site-repo deploy
  # key (it authenticates as the bot PAT instead, decisions/00060 #00061 —
  # git transport AND the PR-open REST call use the same credential), and no
  # published ports — reachable from `wixy` alone, by service name, over
  # compose's own default network (the same implicit network every service in
  # this file already shares; no explicit `networks:` needed for that).
  # Egress restriction beyond "no published ports" is best-effort only (spec's
  # own words: "plain compose cannot express egress allowlists" — a proxy/
  # iptables sidecar is a noted hardening upgrade, not v1); the documented
  # egress this container legitimately needs is api.anthropic.com and
  # github.com/api.github.com, nothing else.
  worker:
    image: ${WIXY_IMAGE:-ghcr.io/joshcomley/wixy:latest}
    command: ["python", "-m", "wixy_server.worker"]
    restart: unless-stopped
    volumes:
      - worker-scratch:/data/worker-scratch
    environment:
      # Never reaches `wixy` (see the block comment above) — both secrets
      # exist ONLY in this service's env.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WIXY_AI_BOT_PAT: ${WIXY_AI_BOT_PAT}
      # Same site repo the `wixy` service checks out (WIXY_SITE_REPO above) —
      # deliberately read from the SAME `.env` value rather than passed
      # through the internal HTTP call, so there's one source of truth, not
      # two that could drift (decisions/00060).
      WIXY_SITE_REPO: ${WIXY_SITE_REPO}
      WIXY_AI_MONTHLY_BUDGET_USD: ${WIXY_AI_MONTHLY_BUDGET_USD:-40}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Pinned by digest, not :latest (Fable review, PR #69 R2): this container
  # mounts /var/run/docker.sock below — root-equivalent on the droplet — and
  # cloudflared is the sole ingress path, so silently auto-upgrading either of
  # these two on every Watchtower poll is the one supply-chain hole in an
  # otherwise zero-inbound design. To bump either digest deliberately: `docker
  # buildx imagetools inspect <image>:latest` (or the Docker Hub UI) for the
  # current manifest-list digest, update the pin here, and land it as its own
  # reviewed PR — never silently.
  cloudflared:
    image: cloudflare/cloudflared@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
    restart: unless-stopped
    command: tunnel run
    environment:
      # TUNNEL_TOKEN (cloudflared's native env form of --token) instead of
      # passing it in `command:` argv (Fable review R5) — argv is visible to
      # anything that can run `docker inspect`/`ps` on the host far more
      # casually than an env var is.
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    depends_on:
      - wixy

  watchtower:
    image: containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Label-scoped (`wixy` + `worker` above — both the SAME image, kept in
    # lockstep so the worker never quietly runs stale code after `wixy`
    # updates) + ~5 min poll — this IS the deploy mechanism (decisions/00051
    # #3): no inbound surface, no CI credentials ever reach the droplet, it
    # only ever pulls.
    command: --interval 300 --label-enable --cleanup

volumes:
  wixy-storage:
  worker-scratch:
